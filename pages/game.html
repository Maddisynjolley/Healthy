<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wake Surf Adventure</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#87ceeb;
}

.screen{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hidden{
display:none;
}

h1{
margin-bottom:20px;
color:white;
text-shadow:2px 2px 6px black;
}

h2{
margin-bottom:20px;
}

.choice-row{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
width:220px;
height:260px;
background:white;
border-radius:15px;
padding:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.card:hover{
transform:scale(1.05);
}

.board{
width:120px;
height:25px;
border-radius:20px;
margin:40px auto;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

#sky{
position:absolute;
inset:0;
background:#87ceeb;
transition:background 5s;
}

#stars{
position:absolute;
inset:0;
display:none;
pointer-events:none;
}

.star{
position:absolute;
color:white;
font-size:14px;
}

#lake{
position:absolute;
bottom:0;
width:100%;
height:60%;
background:#1d89d4;
}

#wake{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:700px;
height:350px;
background:linear-gradient(
to bottom,
rgba(255,255,255,.85),
rgba(255,255,255,.08)
);
clip-path:polygon(50% 0%,100% 100%,0% 100%);
}

.foam{
position:absolute;
inset:0;
background:
repeating-linear-gradient(
90deg,
rgba(255,255,255,.4) 0,
rgba(255,255,255,.4) 10px,
transparent 10px,
transparent 20px
);
animation:foamMove 3s linear infinite;
}

@keyframes foamMove{
from{transform:translateY(0);}
to{transform:translateY(40px);}
}

#surfer{
position:absolute;
bottom:140px;
left:50%;
transform:translateX(-50%);
transition:left .15s;
}

#boardDisplay{
width:90px;
height:18px;
border-radius:20px;
margin:auto;
position:relative;
top:-5px;
}

#animal{
position:relative;
width:80px;
height:130px;
margin:auto;
}

.head{
width:50px;
height:50px;
border-radius:50%;
margin:auto;
}

.glasses{
width:36px;
height:10px;
background:black;
position:absolute;
top:18px;
left:22px;
border-radius:4px;
}

.body{
width:40px;
height:45px;
margin:auto;
}

.trunks{
width:40px;
height:22px;
background:#00aaff;
margin:auto;
}

.legs{
width:30px;
height:20px;
margin:auto;
border-left:4px solid black;
border-right:4px solid black;
}

#score{
position:absolute;
top:15px;
left:15px;
font-size:30px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
}

#timer{
position:absolute;
top:15px;
right:15px;
font-size:30px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
}

#bottle{
position:absolute;
width:24px;
height:58px;
display:none;
cursor:pointer;
}

.cap{
width:14px;
height:8px;
background:#4ea7ff;
margin:auto;
border-radius:3px;
}

.bottleBody{
width:24px;
height:50px;
background:rgba(255,255,255,.75);
border:2px solid rgba(255,255,255,.9);
border-radius:8px;
}

.label{
width:18px;
height:16px;
background:#aee3ff;
margin:12px auto;
}

#instructions{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
color:white;
font-weight:bold;
text-shadow:2px 2px 5px black;
}

#gameOver{
position:absolute;
inset:0;
background:rgba(0,0,0,.85);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:100;
}

button{
padding:15px 30px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
margin-top:15px;
}
</style>
</head>
<body>

<!-- CHARACTER SELECT -->

<div id="characterScreen" class="screen">

<h1>🏄 Wake Surf Adventure 🏄</h1>
<h2>Choose Your Character</h2>

<div class="choice-row">

<div class="card" onclick="chooseCharacter('monkey')">
<h1>🐵</h1>
<h3>Monkey</h3>
<p>Sunglasses & Swim Trunks</p>
</div>

<div class="card" onclick="chooseCharacter('shark')">
<h1>🦈</h1>
<h3>Shark</h3>
<p>Sunglasses & Swim Trunks</p>
</div>

<div class="card" onclick="chooseCharacter('bear')">
<h1>🐻‍❄️</h1>
<h3>Polar Bear</h3>
<p>Sunglasses & Swim Trunks</p>
</div>

</div>

</div>

<!-- BOARD SELECT -->

<div id="boardScreen" class="screen hidden">

<h1>Choose Your Wake Board</h1>

<div class="choice-row">

<div class="card" onclick="chooseBoard('red')">
<div class="board" style="background:red;"></div>
<h3>Red</h3>
</div>

<div class="card" onclick="chooseBoard('lime')">
<div class="board" style="background:lime;"></div>
<h3>Neon Green</h3>
</div>

<div class="card" onclick="chooseBoard('purple')">
<div class="board" style="background:purple;"></div>
<h3>Purple</h3>
</div>

</div>

</div>

<!-- GAME -->

<div id="game" class="hidden">

<div id="sky"></div>

<div id="stars"></div>

<div id="score">Points: 0</div>

<div id="timer">3:00</div>

<div id="lake"></div>

<div id="wake">
<div class="foam"></div>
</div>

<div id="surfer">

<div id="animal">

<div class="head"></div>

<div class="glasses"></div>

<div class="body"></div>

<div class="trunks"></div>

<div class="legs"></div>

</div>

<div id="boardDisplay"></div>

</div>

<div id="bottle">

<div class="cap"></div>

<div class="bottleBody">

<div class="label"></div>

</div>

</div>

<div id="instructions">
⬅️ ➡️ Move To Collect Bottles 
</div>

<div id="gameOver">

<h1>🌙 Night Has Fallen 🌙</h1>

<h2 id="finalScore"></h2>

<button onclick="location.reload()">Play Again</button>

</div>

</div>

<script>

let character="";
let boardColor="";
let score=0;
let timeLeft=180;
let surferPos=50;

const game=document.getElementById("game");
const bottle=document.getElementById("bottle");

function chooseCharacter(c){

character=c;

document.getElementById("characterScreen").classList.add("hidden");
document.getElementById("boardScreen").classList.remove("hidden");

}

function chooseBoard(color){

boardColor=color;

document.getElementById("boardScreen").classList.add("hidden");
game.classList.remove("hidden");

setupCharacter();

startGame();

}

function setupCharacter(){

let head=document.querySelector(".head");
let body=document.querySelector(".body");

if(character==="monkey"){
head.style.background="#8B5A2B";
body.style.background="#8B5A2B";
}

if(character==="shark"){
head.style.background="#7a8c9d";
body.style.background="#7a8c9d";
}

if(character==="bear"){
head.style.background="#ffffff";
body.style.background="#ffffff";
}

document.getElementById("boardDisplay").style.background=boardColor;

}

function startGame(){

setInterval(updateTimer,1000);

setInterval(()=>{

if(timeLeft>0){

spawnBottle();

}

},3000);

}

function spawnBottle(){

let x=Math.random()*60+20;

bottle.style.left=x+"%";
bottle.style.bottom=(Math.random()*20+18)+"%";

bottle.style.display="block";

setTimeout(()=>{

bottle.style.display="none";

},2000);

}

document.addEventListener("keydown",(e)=>{

if(game.classList.contains("hidden")) return;

if(e.key==="ArrowLeft"){
surferPos-=4;
}

if(e.key==="ArrowRight"){
surferPos+=4;
}

surferPos=Math.max(25,Math.min(75,surferPos));

document.getElementById("surfer").style.left=
surferPos+"%";
checkBottleCollision();
if(e.key==="ArrowUp"){



setTimeout(()=>{



},600);

}

});
function checkBottleCollision(){

if(bottle.style.display==="none") return;

let bottleX=parseFloat(bottle.style.left);

if(Math.abs(bottleX-surferPos)<5){

score++;

document.getElementById("score").innerHTML=
"Points: "+score;

bottle.style.display="none";

}

}

function updateTimer(){

timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerHTML=
m+":"+(s<10?"0":"")+s;

let sky=document.getElementById("sky");

if(timeLeft<=120 && timeLeft>60){

sky.style.background="#4e83d4";

}

if(timeLeft<=60 && timeLeft>0){

sky.style.background="#ff9c42";

}

if(timeLeft<=0){

endGame();

}

}
setInterval(checkBottleCollision,50);

function endGame(){

document.getElementById("sky").style.background="#081427";

let stars=document.getElementById("stars");

stars.style.display="block";

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.innerHTML="✦";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*60+"%";

stars.appendChild(star);

}

document.getElementById("finalScore").innerHTML=
"Final Score: "+score+" Bottles Collected";

document.getElementById("gameOver").style.display="flex";

}

</script>

</body>
</html>
